name: build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build"
        required: true

jobs:
  release-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      DOCKER_ORG: ${{ github.actor }}
      DOCKER_TITEL: Magnon base Debian Linux Image
      DOCKER_DESC: Magnon Base Debian Linux Image for Unraid
      DOCKER_PACKAGE: $(echo ${GITHUB_REPOSITORY#*/} | tr '[:upper:]' '[:lower:]')
      DOCKER_SRC: https://github.com/${{ github.repository }}
      DOCKER_LATEST: latest
      RUNNER_TOOL_CACHE: /toolcache
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Login to ghcr.io
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Get Meta
        id: meta
        run: |
          echo REPO=$(echo ${{ github.actor }} | awk '{print tolower($0)}') >> $GITHUB_OUTPUT
          echo REPO_NAME=$(echo ${GITHUB_REPOSITORY} | awk -F"/" '{print $2}') >> $GITHUB_OUTPUT
          echo REPO_VERSION=${{ inputs.tag }} >> $GITHUB_OUTPUT
          echo VERSION=$(grep 'ENV ADGUARDHOME_VERSION=' Dockerfile | sed 's/.*ENV ADGUARDHOME_VERSION=//;s/"//g') >> $GITHUB_OUTPUT             
          echo DATE=$(date) >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          platforms: |
            linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.REPO }}/${{ steps.meta.outputs.REPO_NAME }}:${{ steps.meta.outputs.REPO_VERSION }}
            ghcr.io/${{ steps.meta.outputs.REPO }}/${{ steps.meta.outputs.REPO_NAME }}:${{ env.DOCKER_LATEST }}
          labels: |
            org.opencontainers.image.authors=${{ github.actor }}
            org.opencontainers.image.url=${{ env.DOCKER_SRC }}
            org.opencontainers.image.source=${{ env.DOCKER_SRC }}
            org.opencontainers.image.title=${{ env.DOCKER_TITEL }}
            org.opencontainers.image.description=${{ env.DOCKER_DESC }}
            org.opencontainers.image.created=${{ steps.meta.outputs.DATE }}
            org.opencontainers.image.version=${{ steps.meta.outputs.REPO_VERSION }}
          provenance: false
